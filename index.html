<!DOCTYPE html>
<html>
<head>
<title>My Moon ❤️</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
text-align:center;
background:linear-gradient(to right,#ff9a9e,#fad0c4);
color:#fff;
overflow:hidden;
}

h1{
margin-top:40px;
font-size:40px;
}

#loveText{
font-size:28px;
margin-top:10px;
color:#fff;
text-shadow:0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
min-height:40px;
}

/* ❤️ heartbeat */
@keyframes heartbeat{
0%{transform:scale(1);}
25%{transform:scale(1.2);}
50%{transform:scale(1);}
75%{transform:scale(1.2);}
100%{transform:scale(1);}
}

/* 📸 slideshow */
.slideshow{
position:relative;
width:260px;
height:300px;
margin:20px auto;
overflow:hidden;
border-radius:20px;
background:black;
display:flex;
justify-content:center;
align-items:center;
}

.slide{
position:absolute;
top:0;
left:0;
width:50%;
height:50%;
object-fit:contain;
background:black:
opacity:0;
transition:opacity 1s ease-in-out;
}

.slide.active{
opacity:1;
}

button{
padding:15px 25px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
}

.container{
margin-top:30px;
}

.card{
display:inline-block;
margin:15px;
padding:20px;
width:220px;
background:white;
color:#333;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.1);
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
color:black;
padding:30px;
border-radius:20px;
width:300px;
}

.close{
margin-top:10px;
background:red;
color:white;
padding:10px;
border:none;
border-radius:10px;
}

/* floating hearts */
.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}
</style>
</head>

<body>

<h1>Why I Love You ❤️</h1>
<h2 id="loveText"></h2>

<!-- 📸 SLIDESHOW -->
<div class="slideshow">
  <img src="photo1.jpg" class="slide active">
  <img src="photo2.jpg" class="slide">
  <img src="photo3.jpg" class="slide">
</div>

<p id="msg">Click below 😊</p>

<button onclick="changeText()">Click to Feel Loved</button>

<div class="container">

<div class="card" onclick="openPopup('miss')">
Open When You Miss Me
</div>

<div class="card" onclick="openPopup('sad')">
Open When You're Sad
</div>

<div class="card" onclick="openPopup('happy')">
Open When You're Happy
</div>

</div>

<div class="popup" id="popup">
<div class="popup-content" id="popup-text"></div>
<button class="close" onclick="closePopup()">Close</button>
</div>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>

// button
function changeText(){
document.getElementById("msg").innerHTML =
"You are my favorite person ❤️";
}

// popup
function openPopup(type){
let text="";

if(type=="miss"){
text="I miss you every second ❤️";
}
else if(type=="sad"){
text="Everything will be okay 💕";
}
else if(type=="happy"){
text="Your smile = my happiness 😊❤️";
}

document.getElementById("popup-text").innerHTML=text;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

// typing + heartbeat
const text = "MAHESH 💞 MONCHERY";
let i = 0;

function typeEffect(){
if(i < text.length){
document.getElementById("loveText").innerHTML += text.charAt(i);
i++;
setTimeout(typeEffect,80);
}else{
document.getElementById("loveText").style.animation = "heartbeat 1s infinite";
}
}
typeEffect();

// slideshow
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlide(){
slides.forEach(slide => slide.classList.remove("active"));
index = (index + 1) % slides.length;
slides[index].classList.add("active");
}
setInterval(showSlide,2000);

// hearts
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},5000);
}
setInterval(createHeart,300);

</script>

</body>
</html>
