<!DOCTYPE html>
<html>
<head>
<title>Why I Love You</title>

<style>
body{
text-align:center;
font-family:Arial;
background:#ffe6f0;
overflow:hidden;
}

h1{
color:#ff3366;
margin-top:50px;
}

button{
padding:15px 25px;
background:#ff3366;
color:white;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

.card{
margin:20px;
padding:20px;
border:2px dashed pink;
display:inline-block;
width:220px;
background:white;
border-radius:15px;
}

#message{
font-size:18px;
margin:20px;
}

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}
</style>
</head>

<body>

<h1>Why I Love You ❤️</h1>

<p id="message">Click the button to feel loved</p>

<button onclick="showLove()">Click to Feel Loved</button>

<br><br>

<div class="card">
<h3>Open When You Miss Me</h3>
<p>I’m always thinking about you ❤️</p>
</div>

<div class="card">
<h3>Open When You're Sad</h3>
<p>Everything will be okay. I'm here for you.</p>
</div>

<script>

function showLove(){
document.getElementById("message").innerHTML =
"I love you because your presence is enough ❤️";
}

function createHeart(){
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
