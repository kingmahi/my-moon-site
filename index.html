<!DOCTYPE html>
<html>
<head>
<title>My Moon ❤️</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
text-align:center;
background:linear-gradient(to right,#ff9a9e,#fad0c4);
color:#fff;
overflow:hidden;
}

h1{
margin-top:40px;
font-size:40px;
}

button{
padding:15px 25px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
}

.container{
margin-top:30px;
}

.card{
display:inline-block;
margin:15px;
padding:20px;
width:220px;
background:white;
color:#333;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.1);
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
color:black;
padding:30px;
border-radius:20px;
width:300px;
}

.close{
margin-top:10px;
background:red;
}

/* hearts */
.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}

</style>
</head>

<body>

<h1>Why I Love You ❤️</h1>

<p id="msg">Click below 😊</p>

<button onclick="changeText()">Click to Feel Loved</button>

<div class="container">

<div class="card" onclick="openPopup('miss')">
Open When You Miss Me
</div>

<div class="card" onclick="openPopup('sad')">
Open When You're Sad
</div>

<div class="card" onclick="openPopup('happy')">
Open When You're Happy
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content" id="popup-text"></div>
<button class="close" onclick="closePopup()">Close</button>
</div>

<!-- MUSIC -->
<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>

function changeText(){
document.getElementById("msg").innerHTML =
"You are my favorite person ❤️";
}

function openPopup(type){
let text="";

if(type=="miss"){
text="I miss you every second ❤️";
}
else if(type=="sad"){
text="Hey... everything will be okay, I'm always with you 💕";
}
else if(type=="happy"){
text="Seeing you happy is my happiness 😊❤️";
}

document.getElementById("popup-text").innerHTML=text;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

// hearts
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
